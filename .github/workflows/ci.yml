name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run code formatting check (if any)
      run: |
        echo "Check passed"
        # npm run lint (Add when eslint is configured)

    - name: Start Server and Verify Endpoint
      run: |
        # Start the server in the background
        npm start &
        # Wait for the server to be ready
        sleep 5
        # Ping the swagger doc endpoint to verify it's up
        curl -f http://localhost:5000/api-docs/ || exit 1
