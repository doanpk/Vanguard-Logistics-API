<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard - Premium Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .input-premium {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #e5e7eb;
      transition: all 0.3s ease;
    }
    .input-premium:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
      transform: translateY(-1px);
    }
    .role-btn {
      transition: all 0.3s ease;
    }
    .role-btn.active {
      background-color: #10b981;
      color: white;
      box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
      transform: scale(1.05);
    }
    .dynamic-field {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .dynamic-field.show {
      display: block;
      opacity: 1;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="glass-card w-full max-w-md rounded-3xl p-8 shadow-2xl relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-400 to-cyan-500"></div>
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-tr from-emerald-400 to-cyan-500 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4 transform -rotate-6 hover:rotate-0 transition-transform">
        <i class="fa-solid fa-rocket text-2xl text-white"></i>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">Tham gia hệ thống</h1>
      <p class="text-gray-500 mt-2 text-sm">Trải nghiệm nền tảng giao nhận đỉnh cao</p>
    </div>

    <!-- Role Selection -->
    <div class="flex justify-between bg-gray-100 p-1 rounded-2xl mb-6">
      <button type="button" onclick="selectRole('customer')" id="btn-customer" class="role-btn active flex-1 py-2 px-4 rounded-xl text-sm font-semibold text-gray-600 focus:outline-none"><i class="fa-solid fa-user mr-2"></i>Khách</button>
      <button type="button" onclick="selectRole('driver')" id="btn-driver" class="role-btn flex-1 py-2 px-4 rounded-xl text-sm font-semibold text-gray-600 focus:outline-none"><i class="fa-solid fa-motorcycle mr-2"></i>Tài xế</button>
      <button type="button" onclick="selectRole('store')" id="btn-store" class="role-btn flex-1 py-2 px-4 rounded-xl text-sm font-semibold text-gray-600 focus:outline-none"><i class="fa-solid fa-store mr-2"></i>Cửa hàng</button>
    </div>

    <!-- Form -->
    <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4">
      <input type="hidden" id="role" value="customer">

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 ml-1">Tài khoản</label>
        <div class="relative">
          <i class="fa-solid fa-at absolute left-4 top-3.5 text-gray-400"></i>
          <input type="text" id="username" required placeholder="Nhập tên đăng nhập" class="input-premium w-full pl-11 pr-4 py-3 rounded-xl outline-none text-gray-700">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 ml-1">Mật khẩu</label>
        <div class="relative">
          <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
          <input type="password" id="password" required placeholder="Tối thiểu 6 ký tự" class="input-premium w-full pl-11 pr-4 py-3 rounded-xl outline-none text-gray-700">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 ml-1">Họ và tên</label>
        <div class="relative">
          <i class="fa-solid fa-id-card absolute left-4 top-3.5 text-gray-400"></i>
          <input type="text" id="full_name" required placeholder="Tên hiển thị" class="input-premium w-full pl-11 pr-4 py-3 rounded-xl outline-none text-gray-700">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 ml-1">Số điện thoại</label>
        <div class="relative">
          <i class="fa-solid fa-phone absolute left-4 top-3.5 text-gray-400"></i>
          <input type="tel" id="phone_number" required placeholder="090..." class="input-premium w-full pl-11 pr-4 py-3 rounded-xl outline-none text-gray-700">
        </div>
      </div>

      <!-- Driver Specific Field -->
      <div id="field-vehicle" class="dynamic-field">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 ml-1">Biển số xe / Loại xe</label>
        <div class="relative">
          <i class="fa-solid fa-car absolute left-4 top-3.5 text-gray-400"></i>
          <input type="text" id="vehicle_info" placeholder="VD: 59A1-12345 (Wave RSX)" class="input-premium w-full pl-11 pr-4 py-3 rounded-xl outline-none text-gray-700">
        </div>
      </div>

      <!-- Store Specific Field -->
      <div id="field-address" class="dynamic-field">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 ml-1">Địa chỉ quán</label>
        <div class="relative">
          <i class="fa-solid fa-location-dot absolute left-4 top-3.5 text-gray-400"></i>
          <input type="text" id="address" placeholder="Khu vực TP.HCM" class="input-premium w-full pl-11 pr-4 py-3 rounded-xl outline-none text-gray-700">
        </div>
      </div>

      <div id="error-message" class="text-red-500 text-sm font-semibold text-center hidden mt-2 bg-red-50 p-2 rounded-lg border border-red-100"></div>

      <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-cyan-500/50 transform transition hover:-translate-y-1 mt-6">
        Tạo tài khoản ngay
      </button>

      <div class="mt-6 flex justify-between text-sm text-gray-500">
        <a href="customer.html" class="hover:text-emerald-500 transition"><i class="fa-solid fa-arrow-left mr-1"></i>Về Login Khách</a>
        <a href="driver.html" class="hover:text-emerald-500 transition">Tài xế</a>
        <a href="store.html" class="hover:text-emerald-500 transition">Quán ăn</a>
      </div>
    </form>
  </div>

  <script src="register.js"></script>
</body>
</html>
